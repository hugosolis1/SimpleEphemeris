workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    
    environment:
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen || true
      
      - name: Generate Xcode project
        script: |
          xcodegen generate
      
      - name: Build unsigned IPA
        script: |
          xcodebuild clean build \
            -project SimpleEphemeris.xcodeproj \
            -scheme SimpleEphemeris \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            2>&1 | tee build.log
          
          echo "=== Checking build output ==="
          ls -laR build/Build/Products/ 2>/dev/null || echo "No Products directory"
      
      - name: Create IPA
        script: |
          echo "=== Build Products ==="
          find build -name "*.app" -type d 2>/dev/null || echo "No .app found"
          echo "=== Build Products end ==="
          
          if [ -d "build/Build/Products/Release-iphoneos/SimpleEphemeris.app" ]; then
            mkdir -p build/ipa/Payload
            cp -r build/Build/Products/Release-iphoneos/SimpleEphemeris.app build/ipa/Payload/
            cd build/ipa && zip -r SimpleEphemeris_unsigned.ipa Payload/
            mv SimpleEphemeris_unsigned.ipa ../
          elif [ -d "build/Build/Products/Release-iphoneos/SimpleEphemeris.app" ]; then
            mkdir -p build/ipa/Payload
            cp -r build/Build/Products/Release-iphoneos/SimpleEphemeris.app build/ipa/Payload/
            cd build/ipa && zip -r SimpleEphemeris_unsigned.ipa Payload/
            mv SimpleEphemeris_unsigned.ipa ../
          else
            echo "ERROR: SimpleEphemeris.app not found!"
            ls -laR build/
          fi
          
          ls -la build/SimpleEphemeris_unsigned.ipa 2>/dev/null || echo "IPA not created"
    
    artifacts:
      - build.log
      - build/SimpleEphemeris_unsigned.ipa